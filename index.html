<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla</title>

    <style>

        table{
            border: 5px solid black;
        }

        td{
            border: 15px solid yellow;
            text-align: center;
        }

        #encabezado{
            background-color: aqua;
            color: white;
        }

        table td:first-child{
            background-color: aqua;
            color: white;
        }

        table tr:nth-child(odd){
            background-color: grey;
        }

        table td label:nth-child(4){
            color: red;
        }

         table td option:nth-child(3){
            color: red;
        }

        table td label{
            cursor: pointer;
        }

        table td label:hover{
            font-style: italic;
            background-color: brown;
        }

    </style>

</head>
<body>
    <table>
        <tr id="encabezado">
            <th>ID</th>
            <th>Nombre</th>
            <th>apellido</th>
            <th>Correo</th>
            <th>Opciones</th>
        </tr>
        <tr>
            <td>732737347</td>
            <td>Jorge</td>
            <td>Duran</td>
            <td>xxxx@gmail.com</td>
            <td>
                <input type="radio" name="opcion" value="1">
                <label for="1">1ro</label>
                <input type="radio" name="opcion" value="2">
                <label for="2">2do</label>
                <input type="radio" name="opcion" value="3">
                <label for="3">3ro</label>
            </td>
        </tr>
        <tr>
            <td>732737347</td>
            <td>Jorge</td>
            <td>Duran</td>
            <td>xxxx@gmail.com</td>
            <td>
                <select name="opción">
                    <option value="1">1ro</option>
                    <option value="2">2do</option>
                    <option value="3">3ro</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>732737347</td>
            <td>Jorge</td>
            <td>Duran</td>
            <td>xxxx@gmail.com</td>
                <td>
                    <input type="number" name="n1" placeholder="1ro">
                    <input type="number" name="n2" placeholder="2do">
                    <input type="number" name="n3" placeholder="3ro">
                </td>
        </tr>
        <tr>
            <td>732737347</td>
            <td>Jorge</td>
            <td>Duran</td>
            <td>xxxx@gmail.com</td>
                <td>
                    <input type="text" name="text1" placeholder="1ro" style="width: 50px;">
                    <input type="text" name="text2" placeholder="2do" style="width: 50px;">
                    <input type="text" name="text3" placeholder="3ro" style="width: 50px;">
                </td>
        </tr>
        <tr>
            <td>732737347</td>
            <td>Jorge</td>
            <td>Duran</td>
            <td>xxxx@gmail.com</td>
                <td>
                    <input type="checkbox" name="text1" placeholder="1ro">1ro
                    <input type="checkbox" name="text2" placeholder="2do">2do
                    <input type="checkbox" name="text3" placeholder="3ro">3ro
                </td>
        </tr>
        <tr>
            <td>732737347</td>
            <td>Jorge</td>
            <td>Duran</td>
            <td>xxxx@gmail.com</td>
            <td>
                    <input list="opciones" name="seleccion">
                    <datalist id="opciones">
                    <option value="1ro">
                    <option value="2do">
                    <option value="3ro">
                </datalist>
            </td>
        </tr>
        <tr>
            <td>
                <input type="text" placeholder="ID">
            </td>
            <td>
                <input type="text" placeholder="Nombre">
            </td>
            <td>
                <input type="text" placeholder="Apellido">
            </td>
            <td>
                <input type="email" placeholder="Correo">
            </td>
                <td>
                    <button>Enviar</button>
                </td>
        </tr>

    </table>
    <button>Enviar</button>
</body>
</html>
